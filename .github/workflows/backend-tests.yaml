name: ARXIS Backend CI

# Run this workflow every time code is pushed to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
    # 1. Grab the code from your repository
    - name: Check out repository
      uses: actions/checkout@v4

    # 2. Set up a fresh Python 3.11 environment
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip' # Speeds up future runs

    # 3. Install all the quant libraries and testing tools
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd backend
        pip install -r requirements.txt
        pip install pytest httpx

    # 4. Run the tests!
    - name: Run Pytest
      run: |
        cd backend
        pytest test_main.py -v